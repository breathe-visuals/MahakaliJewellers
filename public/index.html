<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- All dynamic meta tags injected by app.js after config loads -->
  <meta id="meta-theme-color"   name="theme-color"                        content="#003336" />
  <meta id="meta-mobile"        name="mobile-web-app-capable"             content="yes" />
  <meta id="meta-apple-cap"     name="apple-mobile-web-app-capable"       content="yes" />
  <meta id="meta-apple-bar"     name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta id="meta-apple-title"   name="apple-mobile-web-app-title"         content="Jewellers" />
  <meta id="meta-description"   name="description"                        content="Live bullion rates" />

  <title id="page-title">Live Rates</title>

  <!-- Icons (Media/ paths set by app.js) -->
  <link id="favicon-ico" rel="icon"             href="/Media/favicon.ico"        sizes="any" />
  <link id="favicon-32"  rel="icon"             href="/Media/favicon-32x32.png"  type="image/png" sizes="32x32" />
  <link id="favicon-16"  rel="icon"             href="/Media/favicon-16x16.png"  type="image/png" sizes="16x16" />
  <link id="apple-touch" rel="apple-touch-icon" href="/Media/apple-touch-icon.png" />
  <!-- Manifest is served dynamically from server using site-config.json -->
  <link id="manifest"    rel="manifest"         href="/manifest.webmanifest" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="header-inner">
      <img id="header-logo" src="" alt="Logo" class="header-logo" />
      <div class="header-status">
        <span id="status"      class="status-dot"  title="Connection status"></span>
        <span id="lastUpdated" class="last-updated">—</span>
      </div>
    </div>
  </header>

  <!-- ═══ MARQUEE — shown/hidden by config ═══ -->
  <div id="marquee-wrap" class="marquee-container" style="display:none">
    <div class="marquee-bar">
      <marquee id="marquee-text" behavior="scroll" direction="left" scrollamount="8"></marquee>
      <span id="live-clock" class="marquee-clock"></span>
    </div>
  </div>

  <!-- ═══ DESKTOP NAV — built by JS from enabled pages ═══ -->
  <nav id="desktop-nav" class="desktop-nav" role="navigation" aria-label="Main navigation">
    <div id="desktop-nav-inner" class="desktop-nav-inner"></div>
  </nav>

  <!-- ═══ PAGES — injected by app.js ═══ -->
  <div id="pages-root"></div>

  <!-- ═══ CONTACT BAR — built from config ═══ -->
  <div id="contact-bar" class="contact-bar" style="display:none" aria-label="Contact"></div>

  <!-- ═══ BOTTOM NAV — built by JS from enabled pages ═══ -->
  <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Bottom navigation">
    <div id="bottom-nav-inner" class="bottom-nav-inner"></div>
  </nav>

  <!-- ═══ FOOTER — built from config ═══ -->
  <footer id="site-footer" class="site-footer"></footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
