<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#275467" />
  <meta name="description" content="Mahakali Jewellers — live gold, silver and coin rates." />
  <title>Mahakali Jewellers</title>

  <link rel="icon" href="Media/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="Media/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="Media/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="Media/apple-touch-icon.png" />
  <link rel="manifest" href="Media/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-wrap">
        <div class="brand-mark">M</div>
        <div>
          <div class="brand-name">Mahakali Jewellers</div>
          <div class="brand-sub">Live Rate Dashboard</div>
        </div>
      </div>
      <div class="status-chip">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Connecting…</span>
      </div>
      <div id="lastUpdated" class="last-updated">—</div>
    </div>
  </header>

  <main class="app-shell">

    <!-- ══════════════ GOLD PAGE ══════════════ -->
    <section id="page-gold" class="page active">

      <!-- Stack 1: Karat Rates -->
      <div class="stack">
        <div class="stack-title">Karat Rates <span class="stack-sub">(based on 999 IMP RTGS)</span></div>
        <div id="goldKaratGrid" class="karat-grid"></div>
      </div>

      <!-- Stack 2: Gold Product Rates -->
      <div class="stack">
        <div class="stack-title">Gold Product Rates</div>
        <div class="rate-table" id="goldProductTable">
          <div class="rate-row header">
            <div class="rate-cell rate-name">PRODUCT</div>
            <div class="rate-cell rate-num">BID</div>
            <div class="rate-cell rate-num">ASK</div>
            <div class="rate-cell rate-num">HIGH</div>
            <div class="rate-cell rate-num">LOW</div>
          </div>
          <!-- rows injected by JS -->
        </div>
      </div>

      <!-- Stack 3: Future & Spot -->
      <div class="stack">
        <div class="stack-title">Gold Future &amp; Spot</div>
        <div class="two-col">
          <div>
            <div class="mini-title">Future</div>
            <div id="goldFutureTable"></div>
          </div>
          <div>
            <div class="mini-title">Spot</div>
            <div id="goldSpotTable"></div>
          </div>
        </div>
      </div>

    </section>

    <!-- ══════════════ SILVER PAGE ══════════════ -->
    <section id="page-silver" class="page">

      <!-- Stack 1: Silver Product Rates -->
      <div class="stack">
        <div class="stack-title">Silver Product Rates</div>
        <div class="rate-table" id="silverProductTable">
          <div class="rate-row header">
            <div class="rate-cell rate-name">PRODUCT</div>
            <div class="rate-cell rate-num">BID</div>
            <div class="rate-cell rate-num">ASK</div>
            <div class="rate-cell rate-num">HIGH</div>
            <div class="rate-cell rate-num">LOW</div>
          </div>
          <!-- rows injected by JS -->
        </div>
      </div>

      <!-- Stack 2: Future & Spot -->
      <div class="stack">
        <div class="stack-title">Silver Future &amp; Spot</div>
        <div class="two-col">
          <div>
            <div class="mini-title">Future</div>
            <div id="silverFutureTable"></div>
          </div>
          <div>
            <div class="mini-title">Spot</div>
            <div id="silverSpotTable"></div>
          </div>
        </div>
      </div>

    </section>

    <!-- ══════════════ COIN PAGE ══════════════ -->
    <section id="page-coin" class="page">
      <div class="coin-tabs">
        <button id="coinTabGold" class="coin-tab active" type="button">GOLD COIN</button>
        <button id="coinTabSilver" class="coin-tab" type="button">SILVER COIN</button>
      </div>
      <div class="stack">
        <div id="coinTable"></div>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="gold" type="button">Gold</button>
    <button class="nav-item" data-page="silver" type="button">Silver</button>
    <button class="nav-item" data-page="coin" type="button">Coin</button>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
